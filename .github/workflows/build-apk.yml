name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Unzip Android project
        run: |
          echo "Repository files:"
          ls -la

          ZIP_FILE="./NumanInfoScanner_Fixed.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "Fixed ZIP file not found: $ZIP_FILE"
            echo "Please upload NumanInfoScanner_Fixed.zip in repository root."
            exit 1
          fi

          echo "Found ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted

          echo "Extracted files:"
          find extracted -maxdepth 5 -type f | head -n 150

          PROJECT_DIR=$(find extracted -name "settings.gradle" -type f -printf '%h\n' | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "Android project folder not found. settings.gradle missing."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project folder: $PROJECT_DIR"

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumanInfoScanner-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
